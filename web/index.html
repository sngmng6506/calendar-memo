<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daymark Ops Console</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="ops-shell">
      <header class="topbar">
        <div class="title-drag-handle" aria-hidden="true"></div>
        <div class="status-strip" id="statusStrip"></div>
        <div class="topbar-controls">
          <nav id="pageTabs" class="page-tabs" aria-label="Pages"></nav>
          <button id="settingsButton" class="page-tab">SETTINGS</button>
        </div>
      </header>

      <section class="workspace">
        <section class="main-panel">
          <div id="pageMount" class="page-mount"></div>
        </section>
        <aside class="inspector" id="inspector"></aside>
      </section>

      <div id="resizeHandles" class="resize-handles hidden" aria-hidden="true"></div>
      <div id="sizeAdjustBar" class="size-adjust-bar hidden"></div>
      <div id="toast" class="toast hidden"></div>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
