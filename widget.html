<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schedule Widget</title>
    <link rel="stylesheet" href="widget.css" />
  </head>
  <body>
    <main class="widget-shell">
      <section class="widget-panel" aria-label="Desktop schedule widget">
        <canvas id="waveCanvas" width="1400" height="280" aria-hidden="true"></canvas>

        <header class="widget-header">
          <div>
            <p id="rangeLabel" class="range-label">Loading</p>
            <h1>Timeline</h1>
          </div>
          <div class="widget-controls">
            <button id="prevRange" type="button" aria-label="이전 기간">‹</button>
            <button id="todayRange" type="button">Today</button>
            <button id="nextRange" type="button" aria-label="다음 기간">›</button>
            <button id="refreshWidget" type="button">Refresh</button>
          </div>
        </header>

        <div id="statusBar" class="status-bar" role="status"></div>
        <div id="calendarGrid" class="calendar-grid" aria-label="Widget calendar"></div>
      </section>
    </main>

    <script src="core/holiday-calendar.js"></script>
    <script src="holidays/2026.js"></script>
    <script src="core/board-schema.js"></script>
    <script src="core/board-metrics.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
