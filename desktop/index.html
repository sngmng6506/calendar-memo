<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>업무 · 일정 데스크톱</title>
    <link rel="stylesheet" href="/widget-desktop.css" />
  </head>
  <body>
    <main id="app" class="desktop-shell">
      <header class="desktop-menu" data-tauri-drag-region>
        <div class="brand" data-tauri-drag-region>
          <span class="brand-dot"></span>
          <strong data-tauri-drag-region>업무 · 일정</strong>
          <span id="syncBadge" class="sync-badge" data-state="idle">준비</span>
        </div>
        <nav class="menu-actions" aria-label="위젯 메뉴">
          <button id="prevRange" type="button" title="이전 기간">‹</button>
          <button id="todayRange" type="button">오늘</button>
          <button id="nextRange" type="button" title="다음 기간">›</button>
          <button id="toggleGraph" type="button">컨디션 그래프</button>
          <button id="refreshBoard" type="button">새로고침</button>
          <button id="toggleAttach" type="button">바탕화면에 붙이기</button>
          <button id="openSettings" type="button">설정</button>
          <button id="closeApp" type="button" title="앱 종료">종료</button>
        </nav>
      </header>

      <section class="timeline-panel">
        <div class="timeline-heading">
          <div>
            <p id="rangeLabel" class="range-label"></p>
            <h1>목표 타임라인</h1>
          </div>
          <p id="modeLabel" class="mode-label">읽기 전용 · 컨디션만 빠른 기록</p>
        </div>
        <div id="timelineGrid" class="timeline-grid" aria-live="polite"></div>
      </section>

      <section id="graphPanel" class="floating-panel graph-panel" hidden>
        <div class="floating-heading">
          <div>
            <strong>업무량 · 컨디션</strong>
            <p>바탕화면에서는 숨겨 두고 필요할 때만 확인합니다.</p>
          </div>
          <button id="closeGraph" type="button" aria-label="닫기">×</button>
        </div>
        <canvas id="conditionCanvas" width="1200" height="300"></canvas>
        <div class="graph-legend">
          <span><i class="load-line"></i>업무량</span>
          <span><i class="condition-line"></i>컨디션</span>
        </div>
      </section>

      <dialog id="energyDialog">
        <form method="dialog" id="energyForm">
          <div class="dialog-heading">
            <div>
              <strong>컨디션 기록</strong>
              <p id="energyDateLabel"></p>
            </div>
            <button value="cancel" type="submit" class="icon-button">×</button>
          </div>
          <label class="energy-control">
            <input id="energyRange" type="range" min="0" max="120" step="1" value="80" />
            <output id="energyOutput">80</output>
          </label>
          <div class="energy-presets">
            <button type="button" data-energy="40">🤒 40</button>
            <button type="button" data-energy="60">😐 60</button>
            <button type="button" data-energy="80">🙂 80</button>
            <button type="button" data-energy="100">😄 100</button>
          </div>
          <menu>
            <button value="cancel" type="submit" class="secondary">취소</button>
            <button id="saveEnergy" value="default" type="submit">저장</button>
          </menu>
        </form>
      </dialog>

      <dialog id="settingsDialog">
        <form method="dialog" id="settingsForm">
          <div class="dialog-heading">
            <div>
              <strong>데스크톱 연결 설정</strong>
              <p>웹앱의 데이터와 연결할 서버 주소와 토큰을 입력합니다.</p>
            </div>
            <button value="cancel" type="submit" class="icon-button">×</button>
          </div>
          <label>
            <span>서버 주소</span>
            <input id="serverUrl" type="url" placeholder="https://your-app.up.railway.app" required />
          </label>
          <label>
            <span>위젯 토큰</span>
            <textarea id="widgetToken" rows="5" placeholder="웹앱 /desktop-setup.html에서 발급" required></textarea>
          </label>
          <div class="settings-grid">
            <label>
              <span>표시 일수</span>
              <select id="rangeDays">
                <option value="7">7일</option>
                <option value="14">14일</option>
                <option value="21">21일</option>
              </select>
            </label>
            <label>
              <span>배경 투명도</span>
              <input id="panelOpacity" type="range" min="45" max="100" step="1" value="86" />
            </label>
          </div>
          <p id="setupUrlHelp" class="setup-help"></p>
          <menu>
            <button value="cancel" type="submit" class="secondary">취소</button>
            <button id="saveSettings" value="default" type="submit">저장 후 연결</button>
          </menu>
        </form>
      </dialog>
    </main>
    <script type="module" src="/widget-desktop.js"></script>
  </body>
</html>
