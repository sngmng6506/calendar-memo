name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate pull request commit history
        if: github.event_name == 'pull_request'
        run: node scripts/check-commit-message.js --range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
      - name: Run syntax checks and tests
        run: npm run verify
